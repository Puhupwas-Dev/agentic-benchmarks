name: Awesome Lint
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install awesome-lint
        run: npm install --global awesome-lint
      - name: Run awesome-lint
        run: awesome-lint README.md
      - name: Check for broken links (optional)
        run: |
          npx markdown-link-check README.md --config .markdown-link-check.json
